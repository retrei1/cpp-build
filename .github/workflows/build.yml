name: Build for Android

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Android NDK
        # NDK уже предустановлен на серверах GitHub, мы просто указываем путь
        run: echo "ANDROID_NDK=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - name: Configure CMake for Android
        # Мы указываем CMake, что собираем под Android ARM64
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            .

      - name: Build
        run: cmake --build build

      - name: Upload Android Binary
        uses: actions/upload-artifact@v4
        with:
          name: Android_Binary_ARM64
          path: build/MyProject
